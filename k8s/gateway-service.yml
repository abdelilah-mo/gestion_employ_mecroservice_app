apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: abdelilahmo/gateway-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_CONNECTION 
              value: "mysql"
            - name: DB_HOST
              value: "mysql"
            - name: DB_DATABASE
              value: "company_gateway_db"
            - name: DB_USERNAME
              value: "root"
            - name: DB_PASSWORD
              value: "root"
            - name: AUTH_SERVICE_URL
              value: "http://auth:8000"
            - name: EMPLOYEE_SERVICE_URL
              value: "http://employee:8000"
            - name: DEPARTMENT_SERVICE_URL
              value: "http://department:8000"
            - name: POSITION_SERVICE_URL
              value: "http://position:8000"
            - name: SALARY_SERVICE_URL
              value: "http://salary:8000"
            - name: DB_PASSWORD
              value: "root"
          command: ["sh", "-c"]
          args:
            - php artisan config:clear && php artisan cache:clear && php artisan config:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
  type: NodePort