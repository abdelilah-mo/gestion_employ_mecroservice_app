services:
  auth:
    build:
      context: ./auth-service
      dockerfile: dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_URL: http://auth:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: company_auth_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      SERVICE_HTTP_TIMEOUT: 5
    ports:
      - "8005:8000"

  department:
    build:
      context: ./department-service
      dockerfile: dockerfile
    depends_on:
      - auth
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_URL: http://department:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: company_department_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      AUTH_SERVICE_URL: http://auth:8000
      SERVICE_HTTP_TIMEOUT: 5
    ports:
      - "8001:8000"

  position:
    build:
      context: ./position-service
      dockerfile: dockerfile
    depends_on:
      - auth
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_URL: http://position:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: company_position_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      AUTH_SERVICE_URL: http://auth:8000
      SERVICE_HTTP_TIMEOUT: 5
    ports:
      - "8003:8000"

  employee:
    build:
      context: ./employee-service
      dockerfile: dockerfile
    depends_on:
      - auth
      - department
      - position
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_URL: http://employee:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: company_employee_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      AUTH_SERVICE_URL: http://auth:8000
      DEPARTMENT_SERVICE_URL: http://department:8000
      POSITION_SERVICE_URL: http://position:8000
      SERVICE_HTTP_TIMEOUT: 5
    ports:
      - "8002:8000"

  salary:
    build:
      context: ./salary-service
      dockerfile: dockerfile
    depends_on:
      - auth
      - employee
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_URL: http://salary:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: company_salary_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      AUTH_SERVICE_URL: http://auth:8000
      EMPLOYEE_SERVICE_URL: http://employee:8000
      SERVICE_HTTP_TIMEOUT: 5
    ports:
      - "8004:8000"

  gateway:
    build:
      context: ./gateway-service
      dockerfile: dockerfile
    depends_on:
      - auth
      - department
      - employee
      - position
      - salary
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_URL: http://gateway:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: company_gateway_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      AUTH_SERVICE_URL: http://auth:8000
      EMPLOYEE_SERVICE_URL: http://employee:8000
      DEPARTMENT_SERVICE_URL: http://department:8000
      POSITION_SERVICE_URL: http://position:8000
      SALARY_SERVICE_URL: http://salary:8000
      SERVICE_HTTP_TIMEOUT: 5
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    environment:
      VITE_AUTH_API_URL: http://127.0.0.1:8005/api
      VITE_GATEWAY_API_URL: http://127.0.0.1:8000/api
    ports:
      - "5173:5173"
